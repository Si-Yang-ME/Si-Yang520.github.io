<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
  <title>404 迷路啦 · 可爱小星球</title>
  <style>
    /* ---------- 全局重置 & 可爱风格 ---------- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(145deg, #fce9f6 0%, #f8e8ff 40%, #e3f0ff 100%);
      font-family: 'Comic Sans MS', 'Chalkboard SE', 'Quicksand', system-ui, -apple-system, sans-serif;
      padding: 1.5rem;
      /* 背景小点缀：云朵与星星（纯CSS绘制） */
      position: relative;
      overflow-x: hidden;
    }

    /* ---------- 背景装饰：浮动云朵 & 星星 (用伪元素实现) ---------- */
    body::before,
    body::after {
      content: "☁️";
      position: absolute;
      font-size: 6rem;
      opacity: 0.25;
      pointer-events: none;
      animation: floatCloud 18s ease-in-out infinite alternate;
      z-index: 0;
    }
    body::before {
      top: 5%;
      left: 3%;
      font-size: 7rem;
      animation-duration: 22s;
      opacity: 0.2;
    }
    body::after {
      bottom: 5%;
      right: 2%;
      font-size: 9rem;
      animation-duration: 26s;
      animation-delay: 2s;
      opacity: 0.18;
    }

    /* 额外云朵(伪类不够，用额外div) 在HTML中处理，但这里增加星星漂浮 */
    .star-deco {
      position: absolute;
      pointer-events: none;
      z-index: 0;
      font-size: 2rem;
      opacity: 0.35;
      animation: twinkle 4s ease-in-out infinite alternate;
    }
    .star-deco:nth-child(1) { top: 12%; left: 8%; animation-delay: 0.2s; font-size: 2.4rem; }
    .star-deco:nth-child(2) { top: 20%; right: 6%; animation-delay: 1.2s; font-size: 1.8rem; }
    .star-deco:nth-child(3) { bottom: 18%; left: 12%; animation-delay: 0.8s; font-size: 3rem; }
    .star-deco:nth-child(4) { bottom: 28%; right: 10%; animation-delay: 2s; font-size: 2rem; }
    .star-deco:nth-child(5) { top: 45%; left: 4%; animation-delay: 0.5s; font-size: 2.8rem; }
    .star-deco:nth-child(6) { top: 60%; right: 4%; animation-delay: 1.5s; font-size: 2.2rem; }

    /* 小动物装饰 (额外可爱) */
    .animal-deco {
      position: absolute;
      pointer-events: none;
      z-index: 0;
      font-size: 3.2rem;
      opacity: 0.3;
      animation: floatAnimal 12s ease-in-out infinite alternate;
    }
    .animal-deco:nth-of-type(1) { bottom: 10%; left: 5%; animation-delay: 0.3s; }
    .animal-deco:nth-of-type(2) { top: 15%; right: 12%; animation-delay: 1.8s; font-size: 2.8rem; }

    /* ---------- 主卡片容器：圆润柔和 ---------- */
    .container {
      position: relative;
      z-index: 2;
      max-width: 680px;
      width: 100%;
      background: rgba(255, 250, 245, 0.75);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-radius: 72px 72px 72px 72px;
      padding: 3rem 2.5rem 3.5rem;
      box-shadow: 0 20px 60px rgba(210, 170, 230, 0.25),
                  0 8px 24px rgba(255, 220, 240, 0.3),
                  inset 0 0 0 2px rgba(255, 255, 255, 0.7);
      text-align: center;
      transition: transform 0.3s ease;
      border: 1px solid rgba(255, 255, 255, 0.5);
    }

    .container:hover {
      transform: scale(1.01) translateY(-4px);
    }

    /* ---------- 404 主标题：动画浮动 + 可爱字体 ---------- */
    .error-code {
      font-size: 8rem;
      font-weight: 700;
      line-height: 1.2;
      color: #6a4e7a;
      text-shadow: 6px 6px 0 #f3d9ff, 10px 10px 20px rgba(180, 130, 200, 0.2);
      letter-spacing: 6px;
      margin-bottom: 0.25rem;
      display: inline-block;
      animation: floatBounce 4s ease-in-out infinite;
      font-family: 'Comic Sans MS', 'Chalkboard SE', 'Quicksand', cursive;
      position: relative;
    }

    /* 在404数字旁加个小表情 (伪元素) */
    .error-code::after {
      content: "✨";
      font-size: 3.6rem;
      position: relative;
      top: -0.4em;
      left: 0.1em;
      display: inline-block;
      animation: twinkle 2s ease-in-out infinite alternate;
    }
    .error-code::before {
      content: "🌀";
      font-size: 2.8rem;
      position: relative;
      top: -0.3em;
      right: 0.1em;
      display: inline-block;
      animation: spinSlow 8s linear infinite;
      opacity: 0.6;
    }

    /* ---------- 错误说明文字：多语言版本 (中文、英文、日文) ---------- */
    .message {
      font-size: 1.5rem;
      font-weight: 500;
      color: #3d2a4a;
      background: rgba(255, 235, 250, 0.5);
      padding: 0.8rem 1.8rem;
      border-radius: 60px;
      display: inline-block;
      margin: 0.5rem auto 1.2rem;
      backdrop-filter: blur(4px);
      box-shadow: inset 0 1px 4px rgba(255, 255, 255, 0.6);
      line-height: 1.6;
      border: 1px solid rgba(255, 220, 240, 0.3);
    }

    .message small {
      display: block;
      font-size: 0.95rem;
      opacity: 0.7;
      margin-top: 0.2rem;
      font-weight: 400;
      color: #5f4a6b;
    }

    /* 多语言标签 */
    .lang-tag {
      display: flex;
      justify-content: center;
      gap: 1rem;
      flex-wrap: wrap;
      margin: 0.8rem 0 0.2rem;
      font-size: 0.9rem;
      color: #7a5f88;
    }
    .lang-tag span {
      background: rgba(255, 255, 255, 0.4);
      padding: 0.2rem 0.8rem;
      border-radius: 40px;
      backdrop-filter: blur(2px);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    /* ---------- 返回首页按钮：可爱风格 + 微动画 ---------- */
    .home-btn {
      display: inline-block;
      margin-top: 1.8rem;
      padding: 0.9rem 2.8rem;
      font-size: 1.4rem;
      font-weight: 600;
      color: #4d2e5e;
      background: linear-gradient(135deg, #ffe5f9, #ffd9f0);
      border: none;
      border-radius: 60px;
      text-decoration: none;
      box-shadow: 0 8px 20px rgba(200, 150, 220, 0.3), 0 4px 0 0 #d9b0e6;
      transition: all 0.15s ease;
      cursor: pointer;
      backdrop-filter: blur(4px);
      border: 1px solid rgba(255, 255, 255, 0.6);
      letter-spacing: 0.03em;
      position: relative;
    }

    .home-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 28px rgba(200, 150, 220, 0.4), 0 6px 0 0 #c9a0d6;
      background: linear-gradient(135deg, #ffecfa, #ffd6ed);
    }

    .home-btn:active {
      transform: translateY(3px);
      box-shadow: 0 2px 8px rgba(200, 150, 220, 0.2), 0 2px 0 0 #b88ec9;
    }

    /* 按钮内部小图标 */
    .home-btn::before {
      content: "🏠 ";
      font-size: 1.6rem;
      display: inline-block;
      transition: transform 0.2s ease;
    }
    .home-btn:hover::before {
      transform: scale(1.2) rotate(-8deg);
    }

    /* 附加小尾巴：返回文字 */
    .home-btn::after {
      content: " ✨";
      font-size: 1.2rem;
      opacity: 0.6;
    }

    /* ---------- 动画定义 ---------- */
    @keyframes floatCloud {
      0% { transform: translateX(-20px) translateY(0px) scale(1); }
      100% { transform: translateX(40px) translateY(-20px) scale(1.05); }
    }

    @keyframes floatBounce {
      0% { transform: translateY(0px) rotate(-2deg); }
      50% { transform: translateY(-14px) rotate(2deg); }
      100% { transform: translateY(0px) rotate(-2deg); }
    }

    @keyframes twinkle {
      0% { opacity: 0.2; transform: scale(0.9) rotate(0deg); }
      100% { opacity: 0.7; transform: scale(1.3) rotate(25deg); }
    }

    @keyframes floatAnimal {
      0% { transform: translateY(0px) rotate(-5deg); }
      100% { transform: translateY(-24px) rotate(8deg); }
    }

    @keyframes spinSlow {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* ---------- 响应式：移动端适配 ---------- */
    @media (max-width: 600px) {
      body { padding: 1rem; }
      .container {
        padding: 2rem 1.2rem 2.5rem;
        border-radius: 48px;
      }
      .error-code {
        font-size: 5.6rem;
        letter-spacing: 2px;
      }
      .error-code::before {
        font-size: 2rem;
        top: -0.2em;
      }
      .error-code::after {
        font-size: 2.6rem;
        top: -0.2em;
      }
      .message {
        font-size: 1.2rem;
        padding: 0.5rem 1.2rem;
      }
      .message small {
        font-size: 0.8rem;
      }
      .home-btn {
        padding: 0.7rem 2rem;
        font-size: 1.2rem;
      }
      .home-btn::before {
        font-size: 1.3rem;
      }
      .star-deco { font-size: 1.6rem !important; }
      .animal-deco { font-size: 2.4rem !important; }
      .lang-tag { font-size: 0.75rem; gap: 0.5rem; }
    }

    @media (max-width: 420px) {
      .error-code { font-size: 4.4rem; }
      .container { padding: 1.5rem 0.8rem 2rem; }
    }

    /* 辅助：让一些装饰元素更灵动 */
    .floating-heart {
      position: absolute;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      font-size: 1.2rem;
      opacity: 0.2;
      letter-spacing: 8px;
      pointer-events: none;
      white-space: nowrap;
    }
  </style>
</head>
<body>

  <!-- ========== 背景可爱装饰（星星、云朵、小动物） ========== -->
  <div class="star-deco" style="top:8%; left:6%;">⭐</div>
  <div class="star-deco" style="top:22%; right:5%;">🌟</div>
  <div class="star-deco" style="bottom:15%; left:9%;">✨</div>
  <div class="star-deco" style="bottom:30%; right:8%;">🌠</div>
  <div class="star-deco" style="top:50%; left:3%;">🌙</div>
  <div class="star-deco" style="top:70%; right:3%;">☄️</div>

  <div class="animal-deco" style="bottom:5%; left:2%;">🐻‍❄️</div>
  <div class="animal-deco" style="top:8%; right:6%;">🐼</div>
  <div class="animal-deco" style="bottom:20%; right:3%;">🦊</div>
  <div class="animal-deco" style="top:35%; left:2%;">🐨</div>

  <!-- 额外云朵（用div补充） -->
  <div style="position:absolute; top:2%; right:10%; font-size:5rem; opacity:0.15; pointer-events:none; transform:rotate(-6deg); z-index:0;">☁️</div>
  <div style="position:absolute; bottom:8%; left:5%; font-size:7rem; opacity:0.12; pointer-events:none; transform:rotate(10deg); z-index:0;">☁️</div>

  <!-- ========== 主内容 ========== -->
  <div class="container">

    <!-- 404 错误码 + 可爱动画 -->
    <h1 class="error-code" aria-label="404 错误页面">404</h1>

    <!-- 错误原因说明：多语言 (中文 / 英文 / 日文) -->
    <div class="message">
      😢 哎呀！你迷路啦，这个页面已经飞走啦～
      <small>
        <span style="display:inline-block; margin-right:0.4rem;">🌏</span> 
        Oops! You're lost, this page has flown away~ 
        <span style="display:inline-block; margin:0 0.4rem;">🌸</span> 
        お探しのページは見つかりませんでした～
      </small>
    </div>

    <!-- 语言标签（装饰） -->
    <div class="lang-tag">
      <span>🇨🇳 中文</span>
      <span>🇬🇧 English</span>
      <span>🇯🇵 日本語</span>
    </div>

    <!-- 返回首页 按钮 + 可爱图标 -->
    <a href="#" class="home-btn" role="button" aria-label="返回首页">返回首页</a>

    <!-- 底部小彩蛋 (浮动装饰) -->
    <div class="floating-heart">❤️ 🌸 🐾 ✨</div>
  </div>

  <!-- 额外一个小星星 (纯装饰) -->
  <div style="position:absolute; left:50%; top:15%; transform:translateX(-50%); font-size:1.2rem; opacity:0.15; pointer-events:none; z-index:0;">✧ ˚ · .</div>

</body>
</html>
