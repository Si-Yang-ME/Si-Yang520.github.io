<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 · 迷路星球</title>
    <style>
        /* ===== 全局重置 & 柔和可爱风格 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(145deg, #fce9f6 0%, #f3e2ff 45%, #dfefff 100%);
            font-family: 'Comic Sans MS', 'Chalkboard SE', 'Quicksand', system-ui, -apple-system, sans-serif;
            padding: 1.5rem;
            position: relative;
            overflow-x: hidden;
        }

        /* ===== 背景装饰：极简云朵 + 小星星 (干净不杂乱) ===== */
        body::before,
        body::after {
            content: "☁️";
            position: absolute;
            font-size: 5rem;
            opacity: 0.15;
            pointer-events: none;
            z-index: 0;
            animation: floatCloud 20s ease-in-out infinite alternate;
        }
        body::before {
            top: 6%;
            left: 4%;
            font-size: 6rem;
            animation-duration: 24s;
        }
        body::after {
            bottom: 6%;
            right: 4%;
            font-size: 7rem;
            animation-duration: 28s;
            animation-delay: 2s;
        }

        /* 三颗小星星 (极简点缀) */
        .star-deco {
            position: absolute;
            pointer-events: none;
            z-index: 0;
            font-size: 2rem;
            opacity: 0.25;
            animation: twinkle 5s ease-in-out infinite alternate;
        }
        .star-deco:nth-child(1) { top: 12%; left: 10%; animation-delay: 0.2s; }
        .star-deco:nth-child(2) { bottom: 18%; left: 6%; animation-delay: 1.2s; font-size: 2.6rem; }
        .star-deco:nth-child(3) { top: 25%; right: 8%; animation-delay: 0.8s; font-size: 2.2rem; }

        /* ===== 主卡片：干净、圆润、通透 ===== */
        .container {
            position: relative;
            z-index: 2;
            max-width: 620px;
            width: 100%;
            background: rgba(255, 248, 250, 0.70);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 80px 80px 80px 80px;
            padding: 3rem 2.8rem 3.2rem;
            box-shadow: 0 20px 50px rgba(190, 150, 210, 0.20),
                        0 6px 16px rgba(255, 220, 240, 0.25),
                        inset 0 0 0 1.5px rgba(255, 255, 255, 0.6);
            text-align: center;
            transition: transform 0.25s ease;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .container:hover {
            transform: translateY(-6px) scale(1.005);
        }

        /* ===== 404 主标题：柔和阴影 + 微浮动 ===== */
        .error-code {
            font-size: 7.2rem;
            font-weight: 700;
            line-height: 1.2;
            color: #5c3e6e;
            text-shadow: 4px 4px 0 #f0d6ff, 8px 8px 24px rgba(160, 120, 190, 0.15);
            letter-spacing: 4px;
            margin-bottom: 0.2rem;
            display: inline-block;
            animation: floatBounce 5s ease-in-out infinite;
            font-family: 'Comic Sans MS', 'Chalkboard SE', 'Quicksand', cursive;
            position: relative;
        }

        /* 小点缀：在数字旁加一个小星星 (干净) */
        .error-code::after {
            content: "✨";
            font-size: 2.8rem;
            position: relative;
            top: -0.3em;
            left: 0.1em;
            display: inline-block;
            animation: twinkle 2.4s ease-in-out infinite alternate;
            opacity: 0.7;
        }

        /* ===== 错误信息：单语言显示 (由JS控制) ===== */
        .message-wrapper {
            margin: 0.8rem 0 0.2rem;
            min-height: 5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .message {
            font-size: 1.6rem;
            font-weight: 500;
            color: #3d2a4a;
            background: rgba(255, 240, 250, 0.45);
            padding: 0.7rem 2rem;
            border-radius: 60px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: inset 0 1px 6px rgba(255, 255, 255, 0.3);
            line-height: 1.5;
            display: inline-block;
            transition: all 0.2s;
        }

        /* 小字：显示当前语言 (辅助) */
        .lang-hint {
            font-size: 0.8rem;
            opacity: 0.5;
            margin-top: 0.4rem;
            letter-spacing: 1px;
            color: #5f4a6b;
            background: rgba(255, 255, 255, 0.2);
            padding: 0.1rem 1rem;
            border-radius: 30px;
            display: inline-block;
            backdrop-filter: blur(2px);
        }

        /* ===== 返回首页按钮：干净、可爱、指向 si-yang-me.github.io ===== */
        .home-btn {
            display: inline-block;
            margin-top: 2rem;
            padding: 0.85rem 2.8rem;
            font-size: 1.4rem;
            font-weight: 600;
            color: #4d2e5e;
            background: linear-gradient(135deg, #ffe5f9, #ffd6ed);
            border: none;
            border-radius: 60px;
            text-decoration: none;
            box-shadow: 0 6px 18px rgba(190, 140, 210, 0.25), 0 4px 0 0 #d9b0e6;
            transition: all 0.15s ease;
            cursor: pointer;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            letter-spacing: 0.03em;
            position: relative;
        }

        .home-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 26px rgba(190, 140, 210, 0.35), 0 6px 0 0 #c9a0d6;
            background: linear-gradient(135deg, #ffecfa, #ffd6ed);
        }

        .home-btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 8px rgba(190, 140, 210, 0.2), 0 2px 0 0 #b88ec9;
        }

        .home-btn::before {
            content: "🏠 ";
            font-size: 1.5rem;
            display: inline-block;
            transition: transform 0.2s ease;
        }
        .home-btn:hover::before {
            transform: scale(1.15) rotate(-6deg);
        }

        /* ===== 动画关键帧 ===== */
        @keyframes floatCloud {
            0% { transform: translateX(-12px) translateY(0px) scale(1); }
            100% { transform: translateX(30px) translateY(-18px) scale(1.04); }
        }

        @keyframes floatBounce {
            0% { transform: translateY(0px) rotate(-1.5deg); }
            50% { transform: translateY(-12px) rotate(1.5deg); }
            100% { transform: translateY(0px) rotate(-1.5deg); }
        }

        @keyframes twinkle {
            0% { opacity: 0.15; transform: scale(0.9) rotate(0deg); }
            100% { opacity: 0.6; transform: scale(1.3) rotate(20deg); }
        }

        /* ===== 响应式：移动端适配 ===== */
        @media (max-width: 600px) {
            body { padding: 1rem; }
            .container {
                padding: 2rem 1.5rem 2.4rem;
                border-radius: 56px;
            }
            .error-code {
                font-size: 5.2rem;
            }
            .error-code::after {
                font-size: 2rem;
                top: -0.2em;
            }
            .message {
                font-size: 1.3rem;
                padding: 0.5rem 1.2rem;
            }
            .home-btn {
                padding: 0.7rem 2rem;
                font-size: 1.2rem;
            }
            .home-btn::before {
                font-size: 1.2rem;
            }
            .star-deco { font-size: 1.4rem !important; }
            body::before, body::after { font-size: 3.8rem; }
        }

        @media (max-width: 420px) {
            .error-code { font-size: 4.2rem; }
            .container { padding: 1.6rem 1rem 2rem; }
            .message { font-size: 1.1rem; }
        }

        /* 底部小点缀 (极简) */
        .footer-note {
            margin-top: 1.2rem;
            font-size: 0.8rem;
            opacity: 0.25;
            letter-spacing: 2px;
            color: #4d2e5e;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <!-- ===== 背景装饰：极简星星 ===== -->
    <div class="star-deco">⭐</div>
    <div class="star-deco">🌟</div>
    <div class="star-deco">✨</div>

    <!-- ===== 主容器 ===== -->
    <div class="container">

        <!-- 404 错误编号 -->
        <h1 class="error-code" aria-label="404 错误">404</h1>

        <!-- 错误信息：动态单语言显示 (由JS控制) -->
        <div class="message-wrapper">
            <div id="errorMessage" class="message">
                <!-- JS 会填充对应语言 -->
                加载语言中...
            </div>
            <span id="langHint" class="lang-hint">🌍 · 自动识别</span>
        </div>

        <!-- 返回首页按钮：链接到 si-yang-me.github.io -->
        <a href="https://si-yang-me.github.io" class="home-btn" target="_blank" rel="noopener noreferrer">
            返回首页
        </a>

        <!-- 小彩蛋 (干净) -->
        <div class="footer-note">✧ ˚ · 迷路也有小确幸 · ˚ ✧</div>
    </div>

    <script>
        (function() {
            "use strict";

            // ---- 多语言文案 (三种) ----
            const messages = {
                'zh-CN': {
                    text: '😢 哎呀！你迷路啦，这个页面已经飞走啦～',
                    hint: '🇨🇳 中文'
                },
                'en-US': {
                    text: '🌏 Oops! You\'re lost — this page has flown away~',
                    hint: '🇬🇧 English'
                },
                'ja-JP': {
                    text: '🌸 お探しのページは見つかりませんでした～',
                    hint: '🇯🇵 日本語'
                }
            };

            // ---- 默认语言 (如果无法匹配则使用中文) ----
            const DEFAULT_LANG = 'zh-CN';

            // ---- 获取用户语言 / 时区地区 (自动判定) ----
            function detectUserLanguage() {
                // 1. 优先使用 navigator.language (浏览器语言)
                let lang = navigator.language || navigator.languages?.[0] || 'zh-CN';

                // 2. 如果语言是 'zh' 'zh-Hans' 'zh-Hant' 等，统一映射到 'zh-CN'
                if (lang.startsWith('zh')) {
                    return 'zh-CN';
                }
                // 3. 日文
                if (lang.startsWith('ja')) {
                    return 'ja-JP';
                }
                // 4. 英文 (包含 en-US, en-GB, en-AU 等)
                if (lang.startsWith('en')) {
                    return 'en-US';
                }

                // 5. 如果以上都不匹配，尝试通过时区 (Intl.DateTimeFormat) 辅助判断
                try {
                    const timeZone = Intl.DateTimeFormat().resolvedOptions().timeZone;
                    // 如果时区包含 'Asia/Tokyo' 或 'Japan' 等
                    if (timeZone && (timeZone.includes('Tokyo') || timeZone.includes('Japan'))) {
                        return 'ja-JP';
                    }
                    // 如果时区包含 'America' 或 'US' 等，倾向英文
                    if (timeZone && (timeZone.includes('America') || timeZone.includes('US') || timeZone.includes('Canada'))) {
                        return 'en-US';
                    }
                    // 如果时区包含 'Asia/Shanghai' 'Asia/Chongqing' 'Asia/Hong_Kong' 等
                    if (timeZone && (timeZone.includes('Shanghai') || timeZone.includes('Hong_Kong') || timeZone.includes('Chongqing'))) {
                        return 'zh-CN';
                    }
                } catch (_) { /* 忽略时区解析错误 */ }

                // 最后兜底
                return DEFAULT_LANG;
            }

            // ---- 获取最终语言 ----
            const userLang = detectUserLanguage();
            // 确保语言在 messages 中存在，否则回退默认
            const finalLang = messages[userLang] ? userLang : DEFAULT_LANG;
            const messageData = messages[finalLang];

            // ---- 更新 DOM ----
            const msgEl = document.getElementById('errorMessage');
            const hintEl = document.getElementById('langHint');

            if (msgEl && messageData) {
                msgEl.textContent = messageData.text;
            }
            if (hintEl && messageData) {
                hintEl.textContent = '🌍 · ' + messageData.hint;
            }

            // ---- 小细节：如果浏览器语言是日文但时区不是，但依然使用检测结果，优雅降级 ----
            // 打印调试 (非必须)
            console.log('[404] 自动识别语言:', finalLang, '提示:', messageData.hint);
        })();
    </script>

</body>
</html>
