<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    
    <!-- SEO 基础优化：告诉搜索引擎目标网址是什么 -->
    <link rel="canonical" href="http://de-2.frp.one:25566.com">
    
    <!-- 自动跳转：5秒后跳转，对搜索引擎更友好（避免被判定为立即跳转的垃圾页） -->
    <meta http-equiv="refresh" content="0; url=https://你的内网穿透域名.com">
    
    <title>页面加载中 | 网站名称</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 24px;
            padding: 40px 32px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            box-shadow: 0 25px 45px rgba(0,0,0,0.2);
            animation: fadeInUp 0.6s ease-out;
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid #e9ecef;
            border-top-color: #667eea;
            border-radius: 50%;
            margin: 0 auto 24px;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        h1 {
            font-size: 1.75rem;
            color: #1a1a2e;
            margin-bottom: 12px;
            font-weight: 600;
        }
        .message {
            color: #4a5568;
            line-height: 1.5;
            margin-bottom: 24px;
        }
        .url {
            background: #f8f9fa;
            color: #667eea;
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 0.85rem;
            word-break: break-all;
            margin-bottom: 28px;
            display: inline-block;
            font-family: monospace;
        }
        .manual-link {
            display: inline-block;
            background: #667eea;
            color: white;
            text-decoration: none;
            padding: 12px 28px;
            border-radius: 40px;
            font-weight: 500;
            transition: all 0.2s ease;
            box-shadow: 0 4px 8px rgba(102,126,234,0.3);
        }
        .manual-link:hover {
            background: #5a67d8;
            transform: translateY(-2px);
            box-shadow: 0 6px 14px rgba(102,126,234,0.4);
        }
        .counter {
            margin-top: 20px;
            font-size: 0.8rem;
            color: #718096;
        }
        footer {
            margin-top: 24px;
            font-size: 0.7rem;
            color: #a0aec0;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="spinner"></div>
        <h1>即将进入</h1>
        <div class="message">
            正在为您加载更丰富的内容，请稍候片刻
        </div>
        <div class="url">
            🔗 你的内网穿透域名.com
        </div>
        <a href="https://de-2.frp.one:25566.com" class="manual-link" id="directLink">
            立即访问 →
        </a>
        <div class="counter" id="counterText">
            页面将于 <span id="countdown">5</span> 秒后自动跳转
        </div>
        <footer>
            <span id="siteDesc">如果长时间未响应，请点击上方按钮手动进入</span>
        </footer>
    </div>

    <script>
        (function() {
            // ===== 请修改这两处为你的真实地址 =====
            const TARGET_URL = "http://de-2.frp.one:25566";
            const REDIRECT_SECONDS = 0;      // 跳转延迟（秒），建议 3-5 秒
            // ====================================
            
            let secondsLeft = REDIRECT_SECONDS;
            const countdownSpan = document.getElementById('countdown');
            const counterTextDiv = document.getElementById('counterText');
            
            function updateCountdown() {
                if (countdownSpan) {
                    countdownSpan.textContent = secondsLeft;
                }
                if (secondsLeft <= 0) {
                    if (counterTextDiv) counterTextDiv.style.opacity = '0.5';
                    window.location.href = TARGET_URL;
                }
                secondsLeft--;
            }
            
            // 第一秒立即显示，然后每秒更新
            updateCountdown();
            const interval = setInterval(updateCountdown, 1000);
            
            // 手动点击跳转时，清除倒计时，避免重复跳转
            const manualLink = document.getElementById('directLink');
            if (manualLink) {
                manualLink.addEventListener('click', function(e) {
                    clearInterval(interval);
                });
            }
            
            // 可选：给链接绑定正确的目标地址（确保 HTML 内也保持一致）
            if (manualLink && manualLink.href !== TARGET_URL) {
                manualLink.href = TARGET_URL;
            }
            
            // 修正页面中显示的 URL 文本（防止修改代码时忘记改显示文字）
            const urlElement = document.querySelector('.url');
            if (urlElement) {
                const displayUrl = TARGET_URL.replace(/^https?:\/\//, '');
                urlElement.innerHTML = `🔗 ${displayUrl}`;
            }
        })();
    </script>
</body>
</html>
