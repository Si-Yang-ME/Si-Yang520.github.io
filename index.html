<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>北京时间 · 毫秒同步</title>
  <style>
    /* ----- 全局重置与字体 ----- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at 20% 30%, #1a1f2e, #0b0d14);
      font-family: 'Segoe UI', Roboto, system-ui, -apple-system, sans-serif;
      padding: 1.5rem;
      transition: background 0.2s ease;
    }

    /* ----- 主卡片：玻璃质感容器 ----- */
    .clock-container {
      width: 100%;
      max-width: 700px;
      background: rgba(18, 22, 33, 0.7);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-radius: 3.5rem;
      padding: 3rem 2rem;
      box-shadow: 0 30px 50px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.08);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
      transition: all 0.3s ease;
    }

    /* ----- 时间显示区域 ----- */
    .time-display {
      font-family: 'JetBrains Mono', 'Fira Code', 'Courier New', monospace;
      font-size: clamp(3.5rem, 15vw, 7rem);
      font-weight: 600;
      letter-spacing: 0.02em;
      color: #eef5ff;
      text-shadow: 0 0 20px rgba(77, 150, 255, 0.5), 0 4px 12px rgba(0, 0, 0, 0.6);
      background: linear-gradient(180deg, #ffffff 0%, #c8d9ff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 12px #3f6ec6);
      line-height: 1.2;
      text-align: center;
      word-break: break-word;
    }

    /* 毫秒部分可选显示（保持内部精度，视觉可隐藏） */
    .milliseconds {
      font-size: 0.35em;
      vertical-align: super;
      margin-left: 0.15em;
      color: #9bb8ff;
      text-shadow: 0 0 8px #1e3b8a;
      letter-spacing: 0;
    }

    /* ----- 状态栏 ----- */
    .status-area {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 1.2rem 2rem;
      font-size: 0.95rem;
      color: #b4c2e0;
      background: rgba(12, 15, 24, 0.5);
      padding: 0.9rem 2rem;
      border-radius: 3rem;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      width: fit-content;
      max-width: 100%;
    }

    .sync-indicator {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .sync-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #2ecc71;
      box-shadow: 0 0 12px #2ecc71;
      transition: background 0.2s, box-shadow 0.2s;
    }

    .sync-dot.warning {
      background: #f39c12;
      box-shadow: 0 0 12px #f39c12;
    }

    .sync-dot.error {
      background: #e74c3c;
      box-shadow: 0 0 12px #e74c3c;
    }

    .last-sync-text {
      font-weight: 400;
      opacity: 0.9;
    }

    .offset-info {
      font-family: monospace;
      background: rgba(0, 0, 0, 0.35);
      padding: 0.25rem 1rem;
      border-radius: 2rem;
      font-size: 0.85rem;
      color: #ccd9ff;
    }

    /* 移动端优化 */
    @media (max-width: 500px) {
      .clock-container {
        padding: 2.5rem 1.2rem;
        border-radius: 2.5rem;
      }

      .status-area {
        flex-direction: column;
        gap: 0.8rem;
        text-align: center;
        padding: 0.8rem 1.5rem;
      }

      .time-display {
        font-size: clamp(3rem, 12vw, 5rem);
      }
    }
  </style>
</head>
<body>
  <div class="clock-container">
    <!-- 时间展示区（可内部添加毫秒显示，但默认仅显示到秒，保持简洁） -->
    <div id="clockDisplay" class="time-display" aria-live="polite" aria-label="北京时间">
      --:--:--
    </div>

    <!-- 状态与同步信息 -->
    <div class="status-area">
      <div class="sync-indicator">
        <span id="syncDot" class="sync-dot" title="同步状态"></span>
        <span id="syncStatusText">同步中…</span>
      </div>
      <div class="last-sync-text" id="lastSyncLabel">上次同步：--</div>
      <div class="offset-info" id="offsetDisplay">偏移 0ms</div>
    </div>
  </div>

  <script>
    (function() {
      "use strict";

      // ---------- DOM 元素 ----------
      const clockEl = document.getElementById('clockDisplay');
      const syncDotEl = document.getElementById('syncDot');
      const syncStatusTextEl = document.getElementById('syncStatusText');
      const lastSyncLabelEl = document.getElementById('lastSyncLabel');
      const offsetDisplayEl = document.getElementById('offsetDisplay');

      // ---------- 核心变量 ----------
      // offset: 本地时间与北京时间的差值 (毫秒)  北京时间 = Date.now() + offset
      let offset = 0;                 
      // 定时器ID
      let displayTimer = null;
      let syncTimer = null;
      // 同步间隔：5分钟 (300,000ms)
      const SYNC_INTERVAL = 300000;   
      // 显示刷新间隔：为了视觉平滑且内部毫秒校正，使用约30ms刷新 (≈33.3fps)
      const DISPLAY_REFRESH_MS = 30;  

      // 网络请求超时时间 (毫秒)
      const FETCH_TIMEOUT = 6000;

      // 记录上次成功同步的时间戳 (用于显示)
      let lastSuccessfulSyncTime = null;
      // 标记是否正在进行同步 (防止并发)
      let isSyncing = false;

      // ---------- 工具函数：格式化时间 ----------
      function formatBeijingTime(date) {
        const hours = String(date.getHours()).padStart(2, '0');
        const minutes = String(date.getMinutes()).padStart(2, '0');
        const seconds = String(date.getSeconds()).padStart(2, '0');
        // 毫秒部分用于内部展示（可选）但主要显示HH:MM:SS
        return `${hours}:${minutes}:${seconds}`;
      }

      // 获取完整毫秒字符串 (用于显示细微偏移，这里仅内部使用，也可附加显示)
      function getMillisecondsStr(date) {
        return String(date.getMilliseconds()).padStart(3, '0');
      }

      // ---------- 更新UI显示 ----------
      function updateDisplay() {
        if (!clockEl) return;
        
        // 基于当前本地时间 + 偏移量计算北京时间
        const nowBeijing = new Date(Date.now() + offset);
        const timeString = formatBeijingTime(nowBeijing);
        
        // 可选：在秒后面附加毫秒显示 (为保持清晰，使用小字号span)
        // 这里动态构建HTML以包含毫秒，但不影响主视觉清晰度
        const ms = getMillisecondsStr(nowBeijing);
        clockEl.innerHTML = `${timeString}<span class="milliseconds">.${ms}</span>`;
        
        // 更新偏移显示
        if (offsetDisplayEl) {
          const offsetMs = offset;
          offsetDisplayEl.textContent = `偏移 ${offsetMs >= 0 ? '+' : ''}${offsetMs}ms`;
        }
      }

      // ---------- 更新状态UI (同步成功/失败/进行中) ----------
      function setSyncStatus(status, message, lastSyncDate = null) {
        if (!syncDotEl || !syncStatusTextEl) return;
        
        // 移除所有状态类
        syncDotEl.classList.remove('warning', 'error');
        
        switch (status) {
          case 'success':
            syncDotEl.classList.add('success'); // 默认绿色
            syncStatusTextEl.textContent = message || '已同步';
            break;
          case 'syncing':
            syncDotEl.classList.add('warning');
            syncStatusTextEl.textContent = message || '同步中…';
            break;
          case 'error':
            syncDotEl.classList.add('error');
            syncStatusTextEl.textContent = message || '同步失败';
            break;
          default:
            syncStatusTextEl.textContent = message || '未知';
        }
        
        // 更新上次同步时间显示
        if (lastSyncLabelEl) {
          if (lastSuccessfulSyncTime) {
            const date = new Date(lastSuccessfulSyncTime);
            const timeStr = date.toLocaleTimeString('zh-CN', { hour12: false });
            lastSyncLabelEl.textContent = `上次同步：${timeStr}`;
          } else if (lastSyncDate) {
            const date = new Date(lastSyncDate);
            const timeStr = date.toLocaleTimeString('zh-CN', { hour12: false });
            lastSyncLabelEl.textContent = `上次同步：${timeStr}`;
          } else {
            lastSyncLabelEl.textContent = `上次同步：--`;
          }
        }
      }

      // ---------- 核心：从网络API获取北京时间并计算偏移 ----------
      async function fetchBeijingTimeAndSync() {
        if (isSyncing) {
          console.log('同步正在进行中，跳过本次请求');
          return;
        }
        
        isSyncing = true;
        setSyncStatus('syncing', '同步中…');
        
        // 记录请求开始时的本地时间 (用于计算网络耗时的一半作为粗略补偿，可选)
        const requestStartLocal = Date.now();
        
        // 使用两个备选API提高稳定性 (优先使用worldtimeapi，失败后尝试timeapi)
        const apiUrls = [
          'https://worldtimeapi.org/api/timezone/Asia/Shanghai',
          'https://timeapi.io/api/Time/current/zone?timeZone=Asia/Shanghai'
        ];
        
        let success = false;
        let networkDatetime = null; // 存储从API解析到的北京时间的Date对象
        
        // 尝试每个API
        for (const url of apiUrls) {
          if (success) break;
          
          try {
            // 创建可中断的fetch (超时控制)
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), FETCH_TIMEOUT);
            
            const response = await fetch(url, { 
              signal: controller.signal,
              cache: 'no-store' 
            });
            clearTimeout(timeoutId);
            
            if (!response.ok) {
              throw new Error(`HTTP ${response.status}`);
            }
            
            const data = await response.json();
            
            // 解析不同API的datetime字段
            let datetimeStr = null;
            if (data.datetime) {
              // worldtimeapi 返回格式: "2025-03-15T08:30:45.123456+08:00"
              datetimeStr = data.datetime;
            } else if (data.dateTime) {
              // timeapi 可能使用 dateTime 字段 (需确认，实际timeapi返回也有datetime)
              datetimeStr = data.dateTime;
            } else if (data.utc_datetime) {
              // 备用字段
              datetimeStr = data.utc_datetime;
            }
            
            if (!datetimeStr) {
              throw new Error('响应中未找到时间字段');
            }
            
            // 解析为Date对象
            const parsedDate = new Date(datetimeStr);
            if (isNaN(parsedDate.getTime())) {
              throw new Error('时间解析无效');
            }
            
            networkDatetime = parsedDate;
            success = true;
            console.log(`成功从 ${url} 获取北京时间:`, networkDatetime);
          } catch (error) {
            console.warn(`API ${url} 请求失败:`, error.message);
            // 继续尝试下一个API
          }
        }
        
        // 处理同步结果
        if (success && networkDatetime) {
          const requestEndLocal = Date.now();
          // 粗略网络延迟补偿：取请求开始和结束的中间点作为近似网络时间接收时刻
          const approximateReceiveLocal = (requestStartLocal + requestEndLocal) / 2;
          
          // 计算偏移：网络北京时间对应的毫秒数 - 本地时间近似时刻
          const networkTimeMs = networkDatetime.getTime();
          const newOffset = networkTimeMs - approximateReceiveLocal;
          
          // 更新全局偏移量
          offset = newOffset;
          
          // 记录成功同步时间 (使用本地时间标记，方便显示)
          lastSuccessfulSyncTime = Date.now();
          
          setSyncStatus('success', '已同步', lastSuccessfulSyncTime);
          
          // 存储偏移到sessionStorage (可选，页面刷新后仍保留近似值)
          try {
            sessionStorage.setItem('beijing_offset', offset);
            sessionStorage.setItem('beijing_last_sync', lastSuccessfulSyncTime);
          } catch (e) {}
          
          console.log(`偏移更新: ${offset}ms, 网络时间: ${networkDatetime.toISOString()}`);
        } else {
          // 所有API均失败
          setSyncStatus('error', '同步失败，沿用上次偏移');
          console.error('所有时间API均请求失败，保留现有偏移量');
          
          // 尝试从sessionStorage恢复 (如果之前有保存)
          if (offset === 0 && lastSuccessfulSyncTime === null) {
            try {
              const savedOffset = sessionStorage.getItem('beijing_offset');
              const savedLastSync = sessionStorage.getItem('beijing_last_sync');
              if (savedOffset !== null) {
                offset = Number(savedOffset);
                if (!isNaN(offset)) {
                  console.log('从sessionStorage恢复偏移:', offset);
                }
                if (savedLastSync) {
                  lastSuccessfulSyncTime = Number(savedLastSync);
                }
                setSyncStatus('error', '离线模式(使用缓存偏移)', lastSuccessfulSyncTime);
              } else {
                setSyncStatus('error', '无可用偏移，使用本地时间');
              }
            } catch (e) {}
          }
        }
        
        isSyncing = false;
        
        // 立即刷新一次显示，使新偏移生效
        updateDisplay();
      }

      // ---------- 启动显示循环 (高频刷新，保证毫秒级视觉精度) ----------
      function startDisplayLoop() {
        if (displayTimer) clearInterval(displayTimer);
        // 使用setInterval以固定频率刷新，内部基于offset计算准确时间
        displayTimer = setInterval(() => {
          updateDisplay();
        }, DISPLAY_REFRESH_MS);
      }

      // ---------- 启动定期同步循环 ----------
      function startSyncLoop() {
        if (syncTimer) clearInterval(syncTimer);
        // 立即执行一次同步 (页面加载时)
        fetchBeijingTimeAndSync();
        
        // 每5分钟再次同步
        syncTimer = setInterval(() => {
          fetchBeijingTimeAndSync();
        }, SYNC_INTERVAL);
      }

      // ---------- 页面卸载清理 ----------
      function cleanup() {
        if (displayTimer) {
          clearInterval(displayTimer);
          displayTimer = null;
        }
        if (syncTimer) {
          clearInterval(syncTimer);
          syncTimer = null;
        }
      }

      // ---------- 初始化入口 ----------
      function init() {
        // 尝试从sessionStorage恢复上次偏移 (提升首次加载体验)
        try {
          const savedOffset = sessionStorage.getItem('beijing_offset');
          const savedLastSync = sessionStorage.getItem('beijing_last_sync');
          if (savedOffset !== null) {
            const parsedOffset = Number(savedOffset);
            if (!isNaN(parsedOffset)) {
              offset = parsedOffset;
              console.log('初始化：从缓存恢复偏移', offset);
            }
          }
          if (savedLastSync) {
            const parsedLastSync = Number(savedLastSync);
            if (!isNaN(parsedLastSync)) {
              lastSuccessfulSyncTime = parsedLastSync;
              setSyncStatus('success', '已同步(缓存)', lastSuccessfulSyncTime);
            }
          }
        } catch (e) {}
        
        // 启动显示循环 (立即开始基于当前offset显示)
        startDisplayLoop();
        
        // 启动同步循环 (会立即调用一次同步，并设置定时器)
        startSyncLoop();
        
        // 监听页面卸载事件，清理定时器
        window.addEventListener('beforeunload', cleanup);
      }

      // 启动一切
      init();
    })();
  </script>
</body>
</html>
