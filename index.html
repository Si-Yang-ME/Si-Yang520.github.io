<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>安全无痕聊天 - SecureChat</title>
    <style>
        /* ========== 全局样式 ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 600px;
            padding: 30px;
            color: #e0e0e0;
        }

        /* ========== 头部区域 ========== */
        .header {
            text-align: center;
            margin-bottom: 25px;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 600;
            background: linear-gradient(135deg, #00b4db, #0083b0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        .user-id-display {
            background: rgba(0, 180, 219, 0.15);
            border: 1px solid rgba(0, 180, 219, 0.3);
            border-radius: 10px;
            padding: 15px;
            margin-top: 15px;
        }

        .user-id-label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #888;
            margin-bottom: 5px;
        }

        .user-id-value {
            font-family: 'Courier New', monospace;
            font-size: 14px;
            word-break: break-all;
            color: #00b4db;
            user-select: all;
            cursor: pointer;
        }

        /* ========== 连接区域 ========== */
        .connection-panel {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        .input-group input {
            flex: 1;
            padding: 12px 15px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s;
        }

        .input-group input:focus {
            border-color: #00b4db;
        }

        .input-group input::placeholder {
            color: #666;
        }

        /* ========== 按钮样式 ========== */
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #00b4db, #0083b0);
            color: #fff;
            box-shadow: 0 4px 15px rgba(0, 180, 219, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 180, 219, 0.4);
        }

        .btn-danger {
            background: linear-gradient(135deg, #ff416c, #ff4b2b);
            color: #fff;
            box-shadow: 0 4px 15px rgba(255, 65, 108, 0.3);
        }

        .btn-danger:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 65, 108, 0.4);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        /* ========== 聊天区域 ========== */
        .chat-area {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 12px;
            overflow: hidden;
        }

        .chat-header {
            background: rgba(0, 180, 219, 0.1);
            padding: 15px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-header h3 {
            font-size: 16px;
            color: #00b4db;
        }

        .messages-container {
            height: 350px;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        /* 自定义滚动条 */
        .messages-container::-webkit-scrollbar {
            width: 6px;
        }

        .messages-container::-webkit-scrollbar-track {
            background: transparent;
        }

        .messages-container::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 3px;
        }

        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.5;
            word-break: break-word;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.sent {
            align-self: flex-end;
            background: linear-gradient(135deg, #00b4db, #0083b0);
            color: #fff;
            border-bottom-right-radius: 4px;
        }

        .message.received {
            align-self: flex-start;
            background: rgba(255, 255, 255, 0.08);
            color: #e0e0e0;
            border-bottom-left-radius: 4px;
        }

        .message.system {
            align-self: center;
            background: rgba(255, 255, 255, 0.03);
            color: #888;
            font-size: 12px;
            padding: 8px 16px;
            border-radius: 20px;
            max-width: 90%;
            text-align: center;
        }

        .message-input-area {
            display: flex;
            gap: 10px;
            padding: 15px 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(0, 0, 0, 0.15);
        }

        .message-input-area input {
            flex: 1;
            padding: 12px 15px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 25px;
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            font-size: 14px;
            outline: none;
        }

        .message-input-area input:focus {
            border-color: #00b4db;
        }

        .status-indicator {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 8px;
        }

        .status-indicator.online {
            background: #00ff88;
            box-shadow: 0 0 10px #00ff88;
        }

        .status-indicator.connecting {
            background: #ffcc00;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <div class="header">
            <h1>🔒 安全无痕聊天</h1>
            <p style="color: #888; font-size: 13px;">端到端加密 · 不留痕迹</p>
            <div class="user-id-display">
                <div class="user-id-label">您的ID <span style="font-size:10px;">(点击复制)</span></div>
                <div class="user-id-value" id="userIdDisplay" onclick="copyUserId()">连接中...</div>
            </div>
        </div>

        <!-- 连接面板 -->
        <div class="connection-panel" id="connectionPanel">
            <div class="input-group">
                <input type="text" id="targetIdInput" placeholder="输入对方的ID...">
                <button class="btn btn-primary" id="startChatBtn" onclick="startChat()">开始聊天</button>
            </div>
            <p style="font-size: 12px; color: #666; margin-top: 5px;">
                <span class="status-indicator" id="connectionStatus"></span>
                <span id="connectionStatusText">正在连接服务器...</span>
            </p>
        </div>

        <!-- 聊天面板 -->
        <div class="chat-area hidden" id="chatPanel">
            <div class="chat-header">
                <h3>💬 与 <span id="peerIdDisplay">---</span> 的对话</h3>
                <button class="btn btn-danger" style="padding: 8px 16px; font-size: 12px;" onclick="quitChat()">
                    退出聊天
                </button>
            </div>
            <div class="messages-container" id="messagesContainer">
                <div class="message system">聊天已加密，等待密钥交换...</div>
            </div>
            <div class="message-input-area">
                <input type="text" id="messageInput" placeholder="输入消息..." onkeypress="handleKeyPress(event)">
                <button class="btn btn-primary" style="padding: 12px 20px;" onclick="sendMessage()">发送</button>
            </div>
        </div>
    </div>

    <script>
        // ==================== 全局状态 ====================
        
        // WebSocket连接对象
        let ws = null;
        
        // 用户自身信息
        let myUserId = null;
        let myPrivateKey = null;  // CryptoKey对象
        let myPublicKey = null;   // CryptoKey对象
        let myPublicKeyPem = null; // PEM格式公钥字符串
        
        // 聊天对象信息
        let peerId = null;
        let peerPublicKey = null;  // CryptoKey对象
        let aesKey = null;         // CryptoKey对象（AES-GCM）
        
        // ==================== Web Crypto API 封装 ====================
        
        /**
         * 生成RSA-2048密钥对
         * 使用Web Crypto API，密钥不可导出为明文（安全）
         */
        async function generateRSAKeyPair() {
            const keyPair = await window.crypto.subtle.generateKey(
                {
                    name: "RSA-OAEP",
                    modulusLength: 2048,
                    publicExponent: new Uint8Array([1, 0, 1]), // 65537
                    hash: "SHA-256"
                },
                true, // 可导出
                ["encrypt", "decrypt"]
            );
            return keyPair;
        }
        
        /**
         * 导出公钥为PEM格式（用于交换）
         */
        async function exportPublicKeyToPem(publicKey) {
            const exported = await window.crypto.subtle.exportKey(
                "spki",
                publicKey
            );
            const exportedAsBase64 = btoa(String.fromCharCode(...new Uint8Array(exported)));
            // 格式化为PEM
            const pemHeader = "-----BEGIN PUBLIC KEY-----";
            const pemFooter = "-----END PUBLIC KEY-----";
            let pemBody = "";
            for (let i = 0; i < exportedAsBase64.length; i += 64) {
                pemBody += exportedAsBase64.slice(i, i + 64) + "\n";
            }
            return pemHeader + "\n" + pemBody + pemFooter;
        }
        
        /**
         * 从PEM字符串导入公钥
         */
        async function importPublicKeyFromPem(pem) {
            // 移除PEM头尾
            const pemBody = pem
                .replace("-----BEGIN PUBLIC KEY-----", "")
                .replace("-----END PUBLIC KEY-----", "")
                .replace(/\s/g, "");
            const binaryDer = Uint8Array.from(atob(pemBody), c => c.charCodeAt(0));
            return await window.crypto.subtle.importKey(
                "spki",
                binaryDer,
                {
                    name: "RSA-OAEP",
                    hash: "SHA-256"
                },
                true,
                ["encrypt"]
            );
        }
        
        /**
         * RSA-OAEP加密
         */
        async function rsaEncrypt(data, publicKey) {
            const encoded = new TextEncoder().encode(data);
            const encrypted = await window.crypto.subtle.encrypt(
                { name: "RSA-OAEP" },
                publicKey,
                encoded
            );
            return btoa(String.fromCharCode(...new Uint8Array(encrypted)));
        }
        
        /**
         * RSA-OAEP解密
         */
        async function rsaDecrypt(encryptedBase64, privateKey) {
            const encrypted = Uint8Array.from(atob(encryptedBase64), c => c.charCodeAt(0));
            const decrypted = await window.crypto.subtle.decrypt(
                { name: "RSA-OAEP" },
                privateKey,
                encrypted
            );
            return new TextDecoder().decode(decrypted);
        }
        
        /**
         * 生成AES-256-GCM密钥
         */
        async function generateAESKey() {
            return await window.crypto.subtle.generateKey(
                {
                    name: "AES-GCM",
                    length: 256
                },
                true, // 可导出
                ["encrypt", "decrypt"]
            );
        }
        
        /**
         * 导出AES密钥为Base64（用于交换）
         */
        async function exportAESKey(key) {
            const exported = await window.crypto.subtle.exportKey("raw", key);
            return btoa(String.fromCharCode(...new Uint8Array(exported)));
        }
        
        /**
         * 从Base64导入AES密钥
         */
        async function importAESKey(base64Key) {
            const keyData = Uint8Array.from(atob(base64Key), c => c.charCodeAt(0));
            return await window.crypto.subtle.importKey(
                "raw",
                keyData,
                { name: "AES-GCM" },
                true,
                ["encrypt", "decrypt"]
            );
        }
        
        /**
         * AES-GCM加密消息
         */
        async function aesEncrypt(plaintext, key) {
            const encoded = new TextEncoder().encode(plaintext);
            // 生成随机IV（Nonce）- 96位
            const iv = window.crypto.getRandomValues(new Uint8Array(12));
            const encrypted = await window.crypto.subtle.encrypt(
                {
                    name: "AES-GCM",
                    iv: iv
                },
                key,
                encoded
            );
            return {
                ciphertext: btoa(String.fromCharCode(...new Uint8Array(encrypted))),
                nonce: btoa(String.fromCharCode(...iv))
            };
        }
        
        /**
         * AES-GCM解密消息
         */
        async function aesDecrypt(ciphertextBase64, nonceBase64, key) {
            const ciphertext = Uint8Array.from(atob(ciphertextBase64), c => c.charCodeAt(0));
            const nonce = Uint8Array.from(atob(nonceBase64), c => c.charCodeAt(0));
            const decrypted = await window.crypto.subtle.decrypt(
                {
                    name: "AES-GCM",
                    iv: nonce
                },
                key,
                ciphertext
            );
            return new TextDecoder().decode(decrypted);
        }
        
        // ==================== WebSocket连接 ====================
        
        /**
         * 建立WebSocket连接并初始化身份
         * 注意：不发送任何用户标识信息
         */
        async function connectWebSocket() {
            updateConnectionStatus("connecting", "正在连接服务器...");
            
            return new Promise((resolve, reject) => {
                // 连接到WebSocket服务器
                // 在生产环境中应使用 wss:// 并配置SSL
                ws = new WebSocket(`ws://${window.location.hostname}:8765`);
                
                ws.onopen = async () => {
                    updateConnectionStatus("online", "已连接到服务器，等待分配ID...");
                    // 连接建立后，预先生成RSA密钥对
                    try {
                        const keyPair = await generateRSAKeyPair();
                        myPrivateKey = keyPair.privateKey;
                        myPublicKey = keyPair.publicKey;
                        myPublicKeyPem = await exportPublicKeyToPem(myPublicKey);
                    } catch (error) {
                        console.error("密钥生成失败:", error);
                        reject(error);
                    }
                };
                
                ws.onmessage = async (event) => {
                    try {
                        const message = JSON.parse(event.data);
                        await handleServerMessage(message);
                    } catch (error) {
                        console.error("消息解析失败:", error);
                    }
                };
                
                ws.onclose = () => {
                    updateConnectionStatus("offline", "连接已断开");
                    // 清除所有敏感数据
                    clearAllData();
                    showSystemMessage("与服务器的连接已断开");
                };
                
                ws.onerror = (error) => {
                    console.error("WebSocket错误:", error);
                    updateConnectionStatus("offline", "连接错误");
                    reject(error);
                };
                
                // 设置超时
                setTimeout(() => {
                    if (!myUserId) {
                        reject(new Error("连接超时"));
                    } else {
                        resolve();
                    }
                }, 10000);
            });
        }
        
        // ==================== 消息处理 ====================
        
        /**
         * 处理来自服务器的消息
         */
        async function handleServerMessage(message) {
            const { type, data } = message;
            
            switch (type) {
                case "id_assigned":
                    // 接收分配的ID
                    myUserId = data.user_id;
                    document.getElementById("userIdDisplay").textContent = myUserId;
                    updateConnectionStatus("online", "已上线 - 您可以开始聊天");
                    break;
                    
                case "chat_init":
                    // 聊天初始化 - 交换公钥
                    peerId = data.peer_id;
                    document.getElementById("peerIdDisplay").textContent = peerId.substring(0, 8) + "...";
                    showChatPanel();
                    showSystemMessage(`正在与 ${peerId.substring(0, 8)}... 建立加密连接`);
                    
                    // 导入对方的公钥
                    peerPublicKey = await importPublicKeyFromPem(data.peer_public_key);
                    
                    // 生成AES会话密钥
                    aesKey = await generateAESKey();
                    const exportedAESKey = await exportAESKey(aesKey);
                    
                    // 用对方公钥加密AES密钥并发送
                    const encryptedAESKey = await rsaEncrypt(exportedAESKey, peerPublicKey);
                    sendToServer("key_exchange", { encrypted_aes_key: encryptedAESKey });
                    break;
                    
                case "key_exchange":
                    // 接收对方发来的AES密钥
                    const decryptedAESKeyBase64 = await rsaDecrypt(data.encrypted_aes_key, myPrivateKey);
                    aesKey = await importAESKey(decryptedAESKeyBase64);
                    showSystemMessage("🔐 加密通道已建立");
                    break;
                    
                case "key_exchange_complete":
                    showSystemMessage("🔐 加密通道已建立");
                    break;
                    
                case "message":
                    // 接收加密消息并解密
                    if (aesKey) {
                        try {
                            const decryptedText = await aesDecrypt(
                                data.encrypted.ciphertext,
                                data.encrypted.nonce,
                                aesKey
                            );
                            showMessage(decryptedText, "received");
                        } catch (error) {
                            console.error("消息解密失败:", error);
                            showSystemMessage("⚠️ 收到无法解密的消息");
                        }
                    }
                    break;
                    
                case "chat_ended":
                    showSystemMessage(data.message || "聊天已结束");
                    resetChat();
                    break;
                    
                case "quit_ack":
                    showSystemMessage("您已退出聊天");
                    resetChat();
                    break;
                    
                case "error":
                    showSystemMessage("❌ " + data.message);
                    break;
            }
        }
        
        // ==================== UI操作 ====================
        
        function updateConnectionStatus(status, text) {
            const indicator = document.getElementById("connectionStatus");
            const statusText = document.getElementById("connectionStatusText");
            
            indicator.className = "status-indicator " + status;
            statusText.textContent = text;
        }
        
        function showChatPanel() {
            document.getElementById("connectionPanel").classList.add("hidden");
            document.getElementById("chatPanel").classList.remove("hidden");
        }
        
        function hideChatPanel() {
            document.getElementById("connectionPanel").classList.remove("hidden");
            document.getElementById("chatPanel").classList.add("hidden");
        }
        
        function showMessage(text, type) {
            const container = document.getElementById("messagesContainer");
            const msgDiv = document.createElement("div");
            msgDiv.className = `message ${type}`;
            msgDiv.textContent = text;
            container.appendChild(msgDiv);
            container.scrollTop = container.scrollHeight;
        }
        
        function showSystemMessage(text) {
            const container = document.getElementById("messagesContainer");
            const msgDiv = document.createElement("div");
            msgDiv.className = "message system";
            msgDiv.textContent = text;
            container.appendChild(msgDiv);
            container.scrollTop = container.scrollHeight;
        }
        
        function clearMessages() {
            document.getElementById("messagesContainer").innerHTML = "";
        }
        
        /**
         * 复制用户ID到剪贴板
         */
        function copyUserId() {
            if (myUserId) {
                navigator.clipboard.writeText(myUserId).then(() => {
                    alert("ID已复制到剪贴板！");
                }).catch(() => {
                    // 降级方案
                    const display = document.getElementById("userIdDisplay");
                    const range = document.createRange();
                    range.selectNode(display);
                    window.getSelection().removeAllRanges();
                    window.getSelection().addRange(range);
                });
            }
        }
        
        // ==================== 聊天操作 ====================
        
        function sendToServer(type, data = {}) {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type, data }));
            }
        }
        
        /**
         * 开始聊天 - 向服务器请求与目标用户建立连接
         */
        async function startChat() {
            const targetId = document.getElementById("targetIdInput").value.trim();
            if (!targetId) {
                alert("请输入对方的ID");
                return;
            }
            
            if (targetId === myUserId) {
                alert("不能与自己聊天");
                return;
            }
            
            sendToServer("request_chat", { target_id: targetId });
            document.getElementById("startChatBtn").disabled = true;
            document.getElementById("startChatBtn").textContent = "连接中...";
        }
        
        /**
         * 发送加密消息
         */
        async function sendMessage() {
            const input = document.getElementById("messageInput");
            const text = input.value.trim();
            
            if (!text) return;
            if (!aesKey) {
                showSystemMessage("加密通道尚未建立");
                return;
            }
            
            try {
                // AES加密消息内容
                const encrypted = await aesEncrypt(text, aesKey);
                
                // 显示发送的消息
                showMessage(text, "sent");
                
                // 发送加密数据到服务器（服务器不解密，仅转发）
                sendToServer("encrypted_message", { encrypted });
                
                input.value = "";
            } catch (error) {
                console.error("消息加密失败:", error);
                showSystemMessage("消息加密失败");
            }
        }
        
        function handleKeyPress(event) {
            if (event.key === "Enter") {
                sendMessage();
            }
        }
        
        /**
         * 退出聊天 - 清除所有会话数据
         */
        function quitChat() {
            sendToServer("quit_chat");
            clearAllSessionData();
        }
        
        function resetChat() {
            clearAllSessionData();
            hideChatPanel();
            clearMessages();
            document.getElementById("startChatBtn").disabled = false;
            document.getElementById("startChatBtn").textContent = "开始聊天";
            document.getElementById("targetIdInput").value = "";
        }
        
        /**
         * 清除会话密钥数据（无痕设计关键）
         */
        function clearAllSessionData() {
            peerId = null;
            peerPublicKey = null;
            aesKey = null;
            // 注意：不清除RSA密钥对，因为可能用于下次聊天
        }
        
        /**
         * 清除所有加密数据（断开连接时调用）
         */
        function clearAllData() {
            clearAllSessionData();
            myPrivateKey = null;
            myPublicKey = null;
            myPublicKeyPem = null;
            myUserId = null;
        }
        
        // ==================== 初始化 ====================
        
        /**
         * 页面加载时自动连接并初始化
         */
        (async function init() {
            try {
                await connectWebSocket();
                console.log("安全聊天客户端已就绪");
            } catch (error) {
                console.error("初始化失败:", error);
                updateConnectionStatus("offline", "连接失败，请刷新页面重试");
            }
        })();
        
        // 页面关闭前清理
        window.addEventListener("beforeunload", () => {
            if (ws) {
                ws.close();
            }
            clearAllData();
        });
    </script>
</body>
</html>
