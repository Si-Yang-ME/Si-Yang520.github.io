<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>经典扫雷 · Windows 风格</title>
  <style>
    /* ========== 全局重置与字体 ========== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #008080; /* 经典Win95桌面色 */
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Microsoft YaHei', 'Segoe UI', 'Tahoma', 'Arial', sans-serif;
      padding: 20px;
      margin: 0;
    }

    /* 主游戏容器：像素风窗口 */
    .game-container {
      background: #c0c0c0;
      padding: 8px;
      border: 3px solid;
      border-color: #ffffff #808080 #808080 #ffffff;
      box-shadow: 2px 2px 0 #000000;
      display: flex;
      flex-direction: column;
      align-items: center;
      max-width: 600px;
      width: fit-content;
      margin: auto;
    }

    /* 标题栏 */
    .title-bar {
      background: #000080;
      color: white;
      font-weight: bold;
      padding: 4px 6px;
      font-size: 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      margin-bottom: 6px;
      letter-spacing: 0.5px;
    }

    /* 状态面板：雷数、重置按钮、计时器 */
    .status-panel {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      background: #c0c0c0;
      padding: 6px 0;
      gap: 6px;
      flex-wrap: wrap;
    }

    .counter {
      background: black;
      color: red;
      font-family: 'Courier New', monospace;
      font-size: 1.8rem;
      font-weight: bold;
      padding: 2px 8px;
      border: 3px solid;
      border-color: #808080 #ffffff #ffffff #808080;
      min-width: 70px;
      text-align: center;
      line-height: 1.2;
      letter-spacing: 1px;
    }

    .reset-btn {
      background: #c0c0c0;
      border: 3px solid;
      border-color: #ffffff #808080 #808080 #ffffff;
      font-size: 1.8rem;
      width: 50px;
      height: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-weight: bold;
      color: black;
      transition: all 0.05s ease;
      user-select: none;
      touch-action: manipulation;
    }

    .reset-btn:active {
      border-color: #808080 #ffffff #ffffff #808080;
      transform: scale(0.96);
    }

    /* 网格容器 */
    .grid-wrapper {
      background: #c0c0c0;
      border: 3px solid;
      border-color: #808080 #ffffff #ffffff #808080;
      padding: 4px;
      margin: 8px 0;
      display: flex;
      justify-content: center;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(9, 1fr);
      gap: 1px;
      background: #808080;
      border: 1px solid #808080;
      width: 100%;
    }

    /* 单元格样式 */
    .cell {
      aspect-ratio: 1 / 1;
      width: 100%;
      min-width: 30px;
      max-width: 50px;
      background: #c0c0c0;
      border: 3px solid;
      border-color: #ffffff #808080 #808080 #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-family: 'Arial', sans-serif;
      cursor: pointer;
      user-select: none;
      touch-action: manipulation;
      font-size: clamp(1rem, 4vw, 1.5rem);
      transition: none;
      box-sizing: content-box;
    }

    /* 已挖开的格子 */
    .cell.revealed {
      border: 1px solid #808080;
      background: #c0c0c0;
      border-color: #808080;
    }

    /* 数字颜色仿Windows */
    .color1 { color: #0000ff; } /* 1 蓝色 */
    .color2 { color: #008000; } /* 2 绿色 */
    .color3 { color: #ff0000; } /* 3 红色 */
    .color4 { color: #000080; } /* 4 深蓝 */
    .color5 { color: #800000; } /* 5 深红 */
    .color6 { color: #008080; } /* 6 青色 */
    .color7 { color: #000000; } /* 7 黑色 */
    .color8 { color: #808080; } /* 8 灰色 */

    /* 旗子与地雷使用Unicode */
    .flag-icon, .mine-icon {
      font-size: 1.2rem;
      line-height: 1;
    }

    /* 积分显示 */
    .score-area {
      background: #c0c0c0;
      border: 2px solid;
      border-color: #808080 #ffffff #ffffff #808080;
      padding: 4px 12px;
      margin-top: 4px;
      font-weight: bold;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.9rem;
    }

    .score-value {
      background: black;
      color: #00ff00;
      font-family: 'Courier New', monospace;
      padding: 2px 10px;
      font-size: 1.2rem;
      border: 1px inset #808080;
    }

    /* 触控模式提示（小屏显示切换按钮） */
    .touch-mode-toggle {
      display: flex;
      gap: 4px;
      align-items: center;
      font-size: 0.8rem;
      background: #c0c0c0;
      padding: 2px 8px;
      border: 2px solid;
      border-color: #ffffff #808080 #808080 #ffffff;
      margin-left: auto;
    }

    .mode-btn {
      background: #c0c0c0;
      border: 2px solid;
      border-color: #ffffff #808080 #808080 #ffffff;
      padding: 2px 8px;
      cursor: pointer;
      font-weight: bold;
      touch-action: manipulation;
    }

    .mode-btn.active-mode {
      border-color: #808080 #ffffff #ffffff #808080;
      background: #d4d0c8;
    }

    @media (max-width: 500px) {
      .cell {
        min-width: 30px;
        max-width: 45px;
        font-size: 1rem;
      }
      .counter {
        font-size: 1.4rem;
        min-width: 55px;
      }
    }
  </style>
</head>
<body>
<div class="game-container">
  <div class="title-bar">💣 经典扫雷 · Windows 风格</div>

  <!-- 状态栏：剩余雷数、重置、计时 -->
  <div class="status-panel">
    <div class="counter" id="mine-counter">010</div>
    <button class="reset-btn" id="reset-button" title="新游戏">😊</button>
    <div class="counter" id="timer-display">000</div>
  </div>

  <!-- 网格区域 -->
  <div class="grid-wrapper">
    <div class="grid" id="minesweeper-grid"></div>
  </div>

  <!-- 触控辅助：右键模式切换（移动端友好） -->
  <div style="display: flex; justify-content: space-between; align-items: center; width: 100%; margin-top: 4px;">
    <div class="score-area">
      <span>⭐ 积分</span>
      <span class="score-value" id="score-display">0</span>
    </div>
    <div class="touch-mode-toggle" id="touch-toggle-area">
      <span style="margin-right: 4px;">🖐️</span>
      <button class="mode-btn active-mode" id="mode-left-btn">左键</button>
      <button class="mode-btn" id="mode-right-btn">右键</button>
    </div>
  </div>
  <div style="font-size:0.7rem; color:#222; margin-top:2px;">触屏：点击格子=当前模式 | 长按0.5秒=右键标记</div>
</div>

<script>
  (function() {
    /* ========== 游戏配置 ========== */
    const ROWS = 9;
    const COLS = 9;
    const TOTAL_MINES = 10;

    /* ========== DOM 元素 ========== */
    const gridEl = document.getElementById('minesweeper-grid');
    const mineCounterEl = document.getElementById('mine-counter');
    const timerDisplayEl = document.getElementById('timer-display');
    const resetButton = document.getElementById('reset-button');
    const scoreDisplayEl = document.getElementById('score-display');
    const modeLeftBtn = document.getElementById('mode-left-btn');
    const modeRightBtn = document.getElementById('mode-right-btn');

    /* ========== 游戏状态变量 ========== */
    let board = [];                 // 二维数组: { mine, revealed, flagged, adjacentMines }
    let gameActive = false;
    let gameOver = false;
    let gameWin = false;
    let minesPlaced = false;       // 首次点击后布雷
    let flagsPlaced = 0;
    let timerInterval = null;
    let secondsElapsed = 0;
    let firstClickDone = false;

    // 触控辅助：当前触摸模式 'left' 或 'right'
    let touchMode = 'left';        // left: 点击视为左键； right: 点击视为右键

    // 长按检测
    let longPressTimer = null;
    let touchStartRow = null;
    let touchStartCol = null;
    const LONG_PRESS_DURATION = 500;

    /* ========== 积分管理 (localStorage) ========== */
    const STORAGE_KEY = 'minesweeper_score';

    function getScore() {
      try {
        const val = localStorage.getItem(STORAGE_KEY);
        return val ? parseInt(val, 10) : 0;
      } catch (e) {
        return 0;
      }
    }

    function updateScore(delta) {
      try {
        const current = getScore();
        const newScore = Math.max(0, current + delta); // 不低于0
        localStorage.setItem(STORAGE_KEY, newScore);
        scoreDisplayEl.textContent = newScore;
      } catch (e) {
        console.warn('积分更新失败', e);
      }
    }

    function refreshScoreDisplay() {
      scoreDisplayEl.textContent = getScore();
    }

    /* ========== 工具函数 ========== */
    function formatNumber(num, digits = 3) {
      return String(num).padStart(digits, '0').slice(0, digits);
    }

    function updateMineCounter() {
      const remaining = TOTAL_MINES - flagsPlaced;
      mineCounterEl.textContent = formatNumber(remaining, 3);
    }

    function stopTimer() {
      if (timerInterval) {
        clearInterval(timerInterval);
        timerInterval = null;
      }
    }

    function startTimer() {
      if (timerInterval) stopTimer();
      secondsElapsed = 0;
      timerDisplayEl.textContent = formatNumber(0, 3);
      timerInterval = setInterval(() => {
        secondsElapsed++;
        timerDisplayEl.textContent = formatNumber(secondsElapsed, 3);
      }, 1000);
    }

    /* ========== 初始化空棋盘 ========== */
    function createEmptyBoard() {
      return Array(ROWS).fill().map(() => Array(COLS).fill().map(() => ({
        mine: false,
        revealed: false,
        flagged: false,
        adjacentMines: 0
      })));
    }

    /* ========== 随机布雷 (首次点击安全) ========== */
    function placeMines(excludeRow, excludeCol) {
      // 重置所有雷标记
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          board[r][c].mine = false;
        }
      }

      // 计算排除区域：点击位置及其周围8格
      const safeZone = new Set();
      for (let dr = -1; dr <= 1; dr++) {
        for (let dc = -1; dc <= 1; dc++) {
          const nr = excludeRow + dr;
          const nc = excludeCol + dc;
          if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS) {
            safeZone.add(`${nr},${nc}`);
          }
        }
      }

      // 生成所有可能位置并排除安全区
      const candidates = [];
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          if (!safeZone.has(`${r},${c}`)) {
            candidates.push({ r, c });
          }
        }
      }

      // 随机挑选 TOTAL_MINES 个位置
      const shuffled = candidates.sort(() => Math.random() - 0.5);
      const minesToPlace = Math.min(TOTAL_MINES, shuffled.length);
      for (let i = 0; i < minesToPlace; i++) {
        const { r, c } = shuffled[i];
        board[r][c].mine = true;
      }

      // 计算相邻雷数
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          if (board[r][c].mine) {
            board[r][c].adjacentMines = -1;
          } else {
            let count = 0;
            for (let dr = -1; dr <= 1; dr++) {
              for (let dc = -1; dc <= 1; dc++) {
                if (dr === 0 && dc === 0) continue;
                const nr = r + dr, nc = c + dc;
                if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS && board[nr][nc].mine) {
                  count++;
                }
              }
            }
            board[r][c].adjacentMines = count;
          }
        }
      }
      minesPlaced = true;
    }

    /* ========== 递归展开空白区域 ========== */
    function expandEmptyCells(row, col) {
      const queue = [{ r: row, c: col }];
      const visited = new Set();
      
      while (queue.length > 0) {
        const { r, c } = queue.shift();
        const key = `${r},${c}`;
        if (visited.has(key)) continue;
        visited.add(key);

        const cell = board[r][c];
        if (cell.revealed || cell.flagged || cell.mine) continue;

        // 揭开当前格
        cell.revealed = true;

        // 如果是数字，不继续展开
        if (cell.adjacentMines > 0) continue;

        // 空白格：将周围未揭开且非雷非旗的格子加入队列
        for (let dr = -1; dr <= 1; dr++) {
          for (let dc = -1; dc <= 1; dc++) {
            if (dr === 0 && dc === 0) continue;
            const nr = r + dr, nc = c + dc;
            if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS) {
              const neighbor = board[nr][nc];
              if (!neighbor.revealed && !neighbor.flagged && !neighbor.mine) {
                queue.push({ r: nr, c: nc });
              }
            }
          }
        }
      }
    }

    /* ========== 检查胜利条件 ========== */
    function checkVictory() {
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          const cell = board[r][c];
          // 胜利：所有非雷格子都已揭开
          if (!cell.mine && !cell.revealed) {
            return false;
          }
        }
      }
      return true;
    }

    function handleVictory() {
      gameActive = false;
      gameOver = true;
      gameWin = true;
      stopTimer();
      // 自动标记所有雷为旗子（美观）
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          if (board[r][c].mine && !board[r][c].flagged) {
            board[r][c].flagged = true;
            flagsPlaced++;
          }
        }
      }
      updateMineCounter();
      renderGrid();
      updateScore(1);
      resetButton.textContent = '😎';
      alert('🎉 恭喜！你赢了！积分 +1');
    }

    function handleGameOver(clickedRow, clickedCol) {
      gameActive = false;
      gameOver = true;
      gameWin = false;
      stopTimer();
      // 显示所有雷
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          if (board[r][c].mine) {
            board[r][c].revealed = true;
          }
        }
      }
      renderGrid();
      updateScore(-1);
      resetButton.textContent = '😵';
      alert('💥 踩到雷了！游戏结束，积分 -1');
    }

    /* ========== 左键点击逻辑 ========== */
    function leftClick(row, col) {
      if (!gameActive || gameOver) return;
      const cell = board[row][col];
      if (cell.revealed || cell.flagged) return;

      // 首次点击处理：布雷并开始计时
      if (!minesPlaced) {
        placeMines(row, col);
        startTimer();
        firstClickDone = true;
      }

      if (cell.mine) {
        handleGameOver(row, col);
        return;
      }

      // 揭开当前格
      if (cell.adjacentMines === 0) {
        expandEmptyCells(row, col);
      } else {
        cell.revealed = true;
      }

      renderGrid();

      if (checkVictory()) {
        handleVictory();
      }
    }

    /* ========== 右键/标记逻辑 ========== */
    function rightClick(row, col) {
      if (!gameActive || gameOver) return;
      const cell = board[row][col];
      if (cell.revealed) return;

      // 如果还未布雷，不允许标记（但可以允许，不影响）
      if (!minesPlaced) {
        // 首次点击前标记：允许但不影响布雷逻辑
      }

      if (cell.flagged) {
        cell.flagged = false;
        flagsPlaced--;
      } else {
        // 不能超过总雷数（但允许超过，只是计数器负值？传统扫雷限制标记数不超过总雷数）
        if (flagsPlaced >= TOTAL_MINES) {
          // 可选：禁止标记或允许，这里遵循传统：不允许再标记
          return;
        }
        cell.flagged = true;
        flagsPlaced++;
      }

      updateMineCounter();
      renderGrid();

      // 标记后检查胜利（可能所有雷已正确标记且其他格子已开）
      if (checkVictory()) {
        handleVictory();
      }
    }

    /* ========== 双击/同时点击：快速展开 ========== */
    function chordClick(row, col) {
      if (!gameActive || gameOver) return;
      const cell = board[row][col];
      if (!cell.revealed || cell.adjacentMines <= 0) return;

      // 计算周围旗子数量
      let flagCount = 0;
      for (let dr = -1; dr <= 1; dr++) {
        for (let dc = -1; dc <= 1; dc++) {
          if (dr === 0 && dc === 0) continue;
          const nr = row + dr, nc = col + dc;
          if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS && board[nr][nc].flagged) {
            flagCount++;
          }
        }
      }

      if (flagCount !== cell.adjacentMines) return; // 不匹配不操作

      // 展开周围未标记且未揭开的格子
      let hitMine = false;
      for (let dr = -1; dr <= 1; dr++) {
        for (let dc = -1; dc <= 1; dc++) {
          if (dr === 0 && dc === 0) continue;
          const nr = row + dr, nc = col + dc;
          if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS) {
            const neighbor = board[nr][nc];
            if (neighbor.revealed || neighbor.flagged) continue;
            if (neighbor.mine) {
              hitMine = true;
              neighbor.revealed = true; // 显示爆炸位置
            } else {
              // 安全格子，递归展开
              if (neighbor.adjacentMines === 0) {
                expandEmptyCells(nr, nc);
              } else {
                neighbor.revealed = true;
              }
            }
          }
        }
      }

      if (hitMine) {
        handleGameOver(row, col);
      } else {
        renderGrid();
        if (checkVictory()) {
          handleVictory();
        }
      }
    }

    /* ========== 渲染网格 ========== */
    function renderGrid() {
      gridEl.innerHTML = '';
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          const cell = board[r][c];
          const cellDiv = document.createElement('div');
          cellDiv.className = 'cell';
          cellDiv.dataset.row = r;
          cellDiv.dataset.col = c;

          if (cell.revealed) {
            cellDiv.classList.add('revealed');
            if (cell.mine) {
              cellDiv.innerHTML = '<span class="mine-icon">💣</span>';
            } else if (cell.adjacentMines > 0) {
              cellDiv.textContent = cell.adjacentMines;
              cellDiv.classList.add(`color${cell.adjacentMines}`);
            }
          } else if (cell.flagged) {
            cellDiv.innerHTML = '<span class="flag-icon">🚩</span>';
          }

          gridEl.appendChild(cellDiv);
        }
      }
    }

    /* ========== 重置游戏 ========== */
    function resetGame() {
      stopTimer();
      board = createEmptyBoard();
      gameActive = true;
      gameOver = false;
      gameWin = false;
      minesPlaced = false;
      flagsPlaced = 0;
      secondsElapsed = 0;
      firstClickDone = false;
      timerDisplayEl.textContent = formatNumber(0, 3);
      updateMineCounter();
      resetButton.textContent = '😊';
      renderGrid();
    }

    /* ========== 事件绑定 ========== */
    function setupEventListeners() {
      // 鼠标事件（桌面端）
      gridEl.addEventListener('click', (e) => {
        const cell = e.target.closest('.cell');
        if (!cell) return;
        const row = parseInt(cell.dataset.row, 10);
        const col = parseInt(cell.dataset.col, 10);
        if (isNaN(row) || isNaN(col)) return;
        e.preventDefault();
        leftClick(row, col);
      });

      gridEl.addEventListener('contextmenu', (e) => {
        e.preventDefault();
        const cell = e.target.closest('.cell');
        if (!cell) return;
        const row = parseInt(cell.dataset.row, 10);
        const col = parseInt(cell.dataset.col, 10);
        if (isNaN(row) || isNaN(col)) return;
        rightClick(row, col);
      });

      // 双击/同时左右键：通过辅助检测（鼠标中键或同时按下？简化：双击数字格作为chord）
      gridEl.addEventListener('dblclick', (e) => {
        const cell = e.target.closest('.cell');
        if (!cell) return;
        const row = parseInt(cell.dataset.row, 10);
        const col = parseInt(cell.dataset.col, 10);
        if (isNaN(row) || isNaN(col)) return;
        e.preventDefault();
        chordClick(row, col);
      });

      // 触控事件
      gridEl.addEventListener('touchstart', (e) => {
        const cell = e.target.closest('.cell');
        if (!cell) return;
        const row = parseInt(cell.dataset.row, 10);
        const col = parseInt(cell.dataset.col, 10);
        if (isNaN(row) || isNaN(col)) return;
        e.preventDefault();

        touchStartRow = row;
        touchStartCol = col;

        // 启动长按定时器
        if (longPressTimer) clearTimeout(longPressTimer);
        longPressTimer = setTimeout(() => {
          if (touchStartRow === row && touchStartCol === col) {
            // 长按触发右键
            rightClick(row, col);
            // 重置长按状态
            touchStartRow = null;
            touchStartCol = null;
            longPressTimer = null;
          }
        }, LONG_PRESS_DURATION);
      });

      gridEl.addEventListener('touchend', (e) => {
        e.preventDefault();
        if (longPressTimer) {
          clearTimeout(longPressTimer);
          longPressTimer = null;
        }

        if (touchStartRow !== null && touchStartCol !== null) {
          const row = touchStartRow;
          const col = touchStartCol;
          touchStartRow = null;
          touchStartCol = null;

          // 根据当前触摸模式决定行为
          if (touchMode === 'left') {
            leftClick(row, col);
          } else if (touchMode === 'right') {
            rightClick(row, col);
          }
        }
      });

      gridEl.addEventListener('touchmove', (e) => {
        // 移动取消长按
        if (longPressTimer) {
          clearTimeout(longPressTimer);
          longPressTimer = null;
        }
        touchStartRow = null;
        touchStartCol = null;
      });

      // 重置按钮
      resetButton.addEventListener('click', resetGame);
      resetButton.addEventListener('touchend', (e) => {
        e.preventDefault();
        resetGame();
      });

      // 触摸模式切换
      modeLeftBtn.addEventListener('click', () => {
        touchMode = 'left';
        modeLeftBtn.classList.add('active-mode');
        modeRightBtn.classList.remove('active-mode');
      });
      modeRightBtn.addEventListener('click', () => {
        touchMode = 'right';
        modeRightBtn.classList.add('active-mode');
        modeLeftBtn.classList.remove('active-mode');
      });
    }

    /* ========== 初始化 ========== */
    function init() {
      refreshScoreDisplay();
      resetGame();
      setupEventListeners();
    }

    // 启动一切
    init();
  })();
</script>
</body>
</html>
