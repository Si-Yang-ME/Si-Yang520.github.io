<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💕 想对你说</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: linear-gradient(135deg, #fce4ec, #f8bbd0, #f48fb1);
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
    overflow: hidden;
  }

  /* 漂浮爱心背景 */
  .hearts-bg {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
  }

  .floating-heart {
    position: absolute;
    bottom: -50px;
    font-size: 20px;
    animation: floatUp linear infinite;
    opacity: 0.6;
  }

  @keyframes floatUp {
    0% { transform: translateY(0) rotate(0deg) scale(1); opacity: 0.6; }
    50% { opacity: 0.8; }
    100% { transform: translateY(-110vh) rotate(720deg) scale(0.3); opacity: 0; }
  }

  /* 主卡片 */
  .card {
    position: relative;
    z-index: 10;
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(20px);
    border-radius: 30px;
    padding: 50px 40px;
    text-align: center;
    box-shadow: 0 20px 60px rgba(233,30,99,0.2), 0 0 0 1px rgba(255,255,255,0.5);
    max-width: 420px;
    width: 90%;
    animation: cardIn 1s ease-out;
  }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(40px) scale(0.9); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  .avatar {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    background: linear-gradient(135deg, #ec407a, #ab47bc);
    margin: 0 auto 25px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 60px;
    box-shadow: 0 10px 30px rgba(236,64,122,0.4);
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.08); }
  }

  .title {
    font-size: 28px;
    color: #c2185b;
    margin-bottom: 15px;
    font-weight: 700;
  }

  .message {
    font-size: 16px;
    color: #666;
    line-height: 1.8;
    margin-bottom: 35px;
    min-height: 80px;
  }

  .message .typewriter {
    display: inline;
  }

  .cursor {
    display: inline-block;
    width: 2px;
    height: 18px;
    background: #c2185b;
    margin-left: 2px;
    animation: blink 0.8s infinite;
    vertical-align: text-bottom;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }

  .buttons {
    display: flex;
    gap: 20px;
    justify-content: center;
    align-items: center;
    position: relative;
    min-height: 60px;
  }

  .btn-yes {
    padding: 14px 45px;
    font-size: 18px;
    border: none;
    border-radius: 50px;
    background: linear-gradient(135deg, #ec407a, #c2185b);
    color: white;
    cursor: pointer;
    font-weight: 600;
    letter-spacing: 2px;
    box-shadow: 0 8px 25px rgba(236,64,122,0.4);
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
  }

  .btn-yes:hover {
    transform: translateY(-3px) scale(1.05);
    box-shadow: 0 12px 35px rgba(236,64,122,0.5);
  }

  .btn-yes:active {
    transform: scale(0.98);
  }

  .btn-no {
    padding: 14px 40px;
    font-size: 16px;
    border: 2px solid #e0e0e0;
    border-radius: 50px;
    background: white;
    color: #999;
    cursor: pointer;
    font-weight: 500;
    transition: all 0.2s ease;
    position: relative;
  }

  .btn-no:hover {
    border-color: #f48fb1;
    color: #f48fb1;
  }

  /* 成功页面 */
  .success-overlay {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: linear-gradient(135deg, #fce4ec, #f8bbd0);
    z-index: 100;
    display: none;
    justify-content: center;
    align-items: center;
    flex-direction: column;
  }

  .success-overlay.show {
    display: flex;
    animation: fadeIn 0.5s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .success-heart {
    font-size: 100px;
    animation: heartBeat 1s ease-in-out infinite;
  }

  @keyframes heartBeat {
    0%, 100% { transform: scale(1); }
    25% { transform: scale(1.2); }
    50% { transform: scale(1); }
    75% { transform: scale(1.15); }
  }

  .success-text {
    font-size: 32px;
    color: #c2185b;
    margin-top: 20px;
    font-weight: 700;
  }

  .success-sub {
    font-size: 18px;
    color: #e91e63;
    margin-top: 10px;
    opacity: 0.8;
  }

  /* 烟花粒子 */
  .firework {
    position: fixed;
    pointer-events: none;
    z-index: 101;
  }

  .particle {
    position: absolute;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    animation: explode 1s ease-out forwards;
  }

  @keyframes explode {
    0% { transform: translate(0, 0) scale(1); opacity: 1; }
    100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
  }

  /* 拒绝后的提示 */
  .hint {
    position: absolute;
    bottom: -35px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 13px;
    color: #f48fb1;
    white-space: nowrap;
    opacity: 0;
    transition: opacity 0.3s;
  }

  .hint.show {
    opacity: 1;
  }
</style>
</head>
<body>

<!-- 漂浮爱心 -->
<div class="hearts-bg" id="heartsBg"></div>

<!-- 主卡片 -->
<div class="card">
  <div class="avatar">💗</div>
  <div class="title">其实，我喜欢你很久了</div>
  <div class="message">
    <span class="typewriter" id="typewriter"></span><span class="cursor"></span>
  </div>
  <div class="buttons">
    <button class="btn-yes" id="btnYes" onclick="sayYes()">好呀 💕</button>
    <button class="btn-no" id="btnNo" onmouseover="runAway()" onclick="runAway()">再想想</button>
    <span class="hint" id="hint">你抓不到我～ 😜</span>
  </div>
</div>

<!-- 成功页面 -->
<div class="success-overlay" id="successOverlay">
  <div class="success-heart">💖</div>
  <div class="success-text">宝宝</div>
  <div class="success-sub">爱你呦 🥰</div>
</div>

<script>
// 打字机文字
const text = "从遇见你的那一刻起，我就变得不一样了。每一天都想见到你，每一刻都想和你在一起。你愿意和我在一起吗？";
let index = 0;
const typewriter = document.getElementById('typewriter');

function type() {
  if (index < text.length) {
    typewriter.textContent += text.charAt(index);
    index++;
    setTimeout(type, 80);
  }
}
setTimeout(type, 800);

// 漂浮爱心
const heartsBg = document.getElementById('heartsBg');
const heartEmojis = ['💕', '💗', '💖', '💘', '💝', '🩷', '♥️'];

function createHeart() {
  const heart = document.createElement('div');
  heart.className = 'floating-heart';
  heart.textContent = heartEmojis[Math.floor(Math.random() * heartEmojis.length)];
  heart.style.left = Math.random() * 100 + '%';
  heart.style.fontSize = (Math.random() * 20 + 12) + 'px';
  heart.style.animationDuration = (Math.random() * 5 + 6) + 's';
  heartsBg.appendChild(heart);
  setTimeout(() => heart.remove(), 11000);
}
setInterval(createHeart, 400);

// 拒绝按钮逃跑
let noCount = 0;
const btnNo = document.getElementById('btnNo');
const hint = document.getElementById('hint');

function runAway() {
  noCount++;
  const card = document.querySelector('.card');
  const cardRect = card.getBoundingClientRect();

  const maxX = cardRect.width - btnNo.offsetWidth - 20;
  const maxY = 100;

  const randomX = (Math.random() - 0.5) * maxX;
  const randomY = (Math.random() - 0.5) * maxY;

  btnNo.style.transform = `translate(${randomX}px, ${randomY}px)`;
  btnNo.style.transition = 'transform 0.3s ease';

  const hints = ['你抓不到我～ 😜', '再试试？😏', '放弃吧～ 💨', '点左边那个！👈', '就答应我嘛 🥺'];
  hint.textContent = hints[Math.min(noCount - 1, hints.length - 1)];
  hint.classList.add('show');

  // 越点越小
  const scale = Math.max(0.5, 1 - noCount * 0.08);
  btnNo.style.transform += ` scale(${scale})`;
  btnNo.style.opacity = Math.max(0.3, 1 - noCount * 0.1);
}

// 同意
function sayYes() {
  document.getElementById('successOverlay').classList.add('show');
  // 放烟花
  for (let i = 0; i < 5; i++) {
    setTimeout(() => createFirework(), i * 300);
  }
  // 持续放
  setInterval(createFirework, 800);
}

function createFirework() {
  const fw = document.createElement('div');
  fw.className = 'firework';
  fw.style.left = Math.random() * 80 + 10 + '%';
  fw.style.top = Math.random() * 60 + 10 + '%';
  document.body.appendChild(fw);

  const colors = ['#ec407a', '#f48fb1', '#ce93d8', '#ff8a65', '#fff176', '#81c784'];
  for (let i = 0; i < 20; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const angle = (i / 20) * Math.PI * 2;
    const dist = 60 + Math.random() * 80;
    p.style.setProperty('--tx', Math.cos(angle) * dist + 'px');
    p.style.setProperty('--ty', Math.sin(angle) * dist + 'px');
    p.style.background = colors[Math.floor(Math.random() * colors.length)];
    fw.appendChild(p);
  }
  setTimeout(() => fw.remove(), 1200);
}
</script>
</body>
</html>
